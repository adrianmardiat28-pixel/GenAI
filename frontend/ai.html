<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Data Analyst — Movie Intelligence</title>
    
    <!-- Libraries -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <!-- App Scripts -->
    <script src="sidebar.js"></script>
    <script src="ai_chat.js"></script>
    
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #f8f9fc;
            color: #1e293b;
            min-height: 100vh;
            overflow-x: hidden;
            transition: background 0.3s, color 0.3s;
        }

        /* ===== ANIMATED BACKGROUND ===== */
        .ai-bg-grid {
            position: fixed;
            inset: 0;
            z-index: 0;
            background-image:
                radial-gradient(ellipse 600px 400px at 20% 30%, rgba(99, 102, 241, 0.05) 0%, transparent 70%),
                radial-gradient(ellipse 500px 350px at 80% 70%, rgba(168, 85, 247, 0.04) 0%, transparent 70%),
                radial-gradient(ellipse 400px 300px at 50% 50%, rgba(59, 130, 246, 0.03) 0%, transparent 70%);
            animation: bgPulse 8s ease-in-out infinite alternate;
        }
        @keyframes bgPulse {
            0% { opacity: 0.5; }
            100% { opacity: 0.8; }
        }

        /* Subtle grid pattern */
        .ai-bg-grid::before {
            content: '';
            position: absolute;
            inset: 0;
            background-image:
                linear-gradient(rgba(99, 102, 241, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(99, 102, 241, 0.02) 1px, transparent 1px);
            background-size: 60px 60px;
        }

        /* ===== MAIN LAYOUT ===== */
        .ai-main {
            margin-left: 16rem;
            position: relative;
            z-index: 1;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ===== HEADER ===== */
        .ai-header {
            padding: 2rem 2.5rem 1.5rem;
            border-bottom: 1px solid rgba(99, 102, 241, 0.1);
            backdrop-filter: blur(20px);
            background: rgba(255, 255, 255, 0.8);
            position: sticky;
            top: 0;
            z-index: 10;
            transition: background 0.3s;
        }
        .ai-header-title {
            font-size: 2rem;
            font-weight: 800;
            background: linear-gradient(135deg, #6366f1, #8b5cf6, #ec4899);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.03em;
        }
        .ai-header-sub {
            color: #64748b;
            font-size: 0.875rem;
            margin-top: 0.25rem;
            transition: color 0.3s;
        }
        .ai-header-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(99, 102, 241, 0.08);
            border: 1px solid rgba(99, 102, 241, 0.2);
            color: #6366f1;
            font-size: 0.7rem;
            font-weight: 600;
            padding: 4px 12px;
            border-radius: 9999px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            transition: all 0.3s;
        }
        .ai-header-badge .pulse-dot {
            width: 6px;
            height: 6px;
            background: #34d399;
            border-radius: 50%;
            animation: pulseDot 2s ease-in-out infinite;
        }
        @keyframes pulseDot {
            0%, 100% { opacity: 0.5; transform: scale(0.8); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        /* ===== CONTENT AREA ===== */
        .ai-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 1.5rem 2.5rem 0;
            gap: 1.5rem;
        }

        /* ===== CHARTS GRID ===== */
        .ai-charts-section {
            flex: 1;
            min-height: 200px;
        }
        .ai-charts-section-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1rem;
        }
        .ai-section-title {
            font-size: 0.8rem;
            font-weight: 700;
            color: #6366f1;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: color 0.3s;
        }
        .ai-section-title::before {
            content: '';
            width: 3px;
            height: 16px;
            background: linear-gradient(180deg, #6366f1, #a78bfa);
            border-radius: 2px;
        }

        #ai-clear-charts {
            display: none;
            align-items: center;
            gap: 6px;
            padding: 6px 14px;
            font-size: 0.75rem;
            font-weight: 600;
            color: #f87171;
            background: rgba(248, 113, 113, 0.08);
            border: 1px solid rgba(248, 113, 113, 0.15);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }
        #ai-clear-charts:hover {
            background: rgba(248, 113, 113, 0.15);
            border-color: rgba(248, 113, 113, 0.3);
        }

        #ai-charts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(480px, 1fr));
            gap: 1.25rem;
        }

        /* ===== CHART CARD ===== */
        .ai-chart-card {
            background: rgba(255, 255, 255, 0.7);
            border: 1px solid rgba(99, 102, 241, 0.12);
            border-radius: 16px;
            overflow: hidden;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
            box-shadow: 0 2px 12px rgba(99, 102, 241, 0.06);
        }
        .ai-chart-card:hover {
            border-color: rgba(99, 102, 241, 0.25);
            box-shadow: 0 4px 20px rgba(99, 102, 241, 0.12);
            transform: translateY(-2px);
        }
        .ai-chart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 1.25rem 0.75rem;
            border-bottom: 1px solid rgba(99, 102, 241, 0.08);
        }
        .ai-chart-title-row {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .ai-chart-icon { font-size: 1.1rem; }
        .ai-chart-title {
            font-size: 0.85rem;
            font-weight: 700;
            color: #1e293b;
            letter-spacing: -0.01em;
            transition: color 0.3s;
        }
        .ai-chart-actions {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .ai-chart-type-badge {
            font-size: 0.65rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: #6366f1;
            background: rgba(99, 102, 241, 0.08);
            padding: 3px 10px;
            border-radius: 6px;
            transition: all 0.3s;
        }
        .ai-chart-delete-btn {
            color: #cbd5e1;
            background: none;
            border: none;
            cursor: pointer;
            padding: 4px;
            border-radius: 6px;
            transition: all 0.2s;
            display: flex;
            align-items: center;
        }
        .ai-chart-delete-btn:hover {
            color: #f87171;
            background: rgba(248, 113, 113, 0.1);
        }
        .ai-chart-body {
            padding: 0.75rem 0.5rem 0.5rem;
            min-height: 320px;
        }

        /* ===== EMPTY STATE ===== */
        #ai-empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 4rem 2rem;
            text-align: center;
            min-height: 300px;
        }
        .ai-empty-icon {
            font-size: 4rem;
            margin-bottom: 1rem;
            opacity: 0.5;
            animation: floatIcon 3s ease-in-out infinite;
        }
        @keyframes floatIcon {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }
        .ai-empty-title {
            font-size: 1.1rem;
            font-weight: 700;
            color: #1e293b;
            margin-bottom: 0.5rem;
            transition: color 0.3s;
        }
        .ai-empty-desc {
            font-size: 0.8rem;
            color: #64748b;
            max-width: 400px;
            line-height: 1.6;
            transition: color 0.3s;
        }

        /* ===== CHAT PANEL (Bottom) ===== */
        .ai-chat-panel {
            position: sticky;
            bottom: 0;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(20px);
            border-top: 1px solid rgba(99, 102, 241, 0.1);
            padding: 1rem 2.5rem 1.25rem;
            z-index: 20;
            transition: background 0.3s;
        }

        /* Suggestion chips */
        .ai-suggestions {
            display: flex;
            gap: 8px;
            margin-bottom: 0.75rem;
            overflow-x: auto;
            padding-bottom: 4px;
            scrollbar-width: none;
        }
        .ai-suggestions::-webkit-scrollbar { display: none; }

        .ai-suggestion-chip {
            flex-shrink: 0;
            font-size: 0.72rem;
            font-weight: 500;
            color: #64748b;
            background: rgba(99, 102, 241, 0.04);
            border: 1px solid rgba(99, 102, 241, 0.15);
            padding: 6px 14px;
            border-radius: 9999px;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
        }
        .ai-suggestion-chip:hover {
            color: #6366f1;
            background: rgba(99, 102, 241, 0.08);
            border-color: rgba(99, 102, 241, 0.3);
        }

        /* Input row */
        .ai-input-row {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        #ai-chat-input {
            flex: 1;
            background: rgba(255, 255, 255, 0.8);
            border: 1px solid rgba(99, 102, 241, 0.15);
            border-radius: 14px;
            padding: 14px 20px;
            font-size: 0.9rem;
            color: #1e293b;
            outline: none;
            font-family: 'Inter', sans-serif;
            transition: all 0.3s;
        }
        #ai-chat-input::placeholder {
            color: #94a3b8;
        }
        #ai-chat-input:focus {
            border-color: rgba(99, 102, 241, 0.4);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.08);
        }
        #ai-send-btn {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            border: none;
            color: white;
            padding: 14px 24px;
            border-radius: 14px;
            font-size: 0.85rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            font-family: 'Inter', sans-serif;
            display: flex;
            align-items: center;
            gap: 8px;
            white-space: nowrap;
        }
        #ai-send-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 20px rgba(99, 102, 241, 0.3);
        }
        #ai-send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        #ai-send-btn svg {
            width: 18px;
            height: 18px;
        }

      /* ===== CHAT MESSAGES (Full Height) ===== */
        #ai-chat-messages {
            flex: 1; /* Biarkan area chat memanjang mengisi layar */
            height: 100%; /* Pastikan tingginya full */
            overflow-y: auto;
            padding: 1rem 0 2rem 0;
            display: flex;
            flex-direction: column;
            gap: 1.5rem; /* Beri jarak antar chat agar lebih lega */
            scrollbar-width: thin;
            scrollbar-color: rgba(99, 102, 241, 0.4) transparent;
        }
        #ai-chat-messages::-webkit-scrollbar { width: 4px; }
        #ai-chat-messages::-webkit-scrollbar-thumb { background: rgba(99, 102, 241, 0.2); border-radius: 4px; }

        .ai-msg { display: flex; }
        .ai-msg-user { justify-content: flex-end; }
        .ai-msg-ai { justify-content: flex-start; }

        .ai-msg-bubble {
            max-width: 85%;
            display: flex;
            gap: 10px;
            align-items: flex-start;
        }
        .ai-msg-bubble-user {
            flex-direction: row-reverse;
        }
        .ai-msg-avatar {
            flex-shrink: 0;
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.85rem;
            background: rgba(99, 102, 241, 0.1);
            border-radius: 8px;
            margin-top: 2px;
            transition: background 0.3s;
        }
        .ai-msg-content {
            font-size: 0.82rem;
            line-height: 1.65;
            padding: 10px 16px;
            border-radius: 14px;
            transition: all 0.3s;
        }
        .ai-msg-bubble-user .ai-msg-content {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: white;
            border-bottom-right-radius: 4px;
        }
        .ai-msg-bubble-ai .ai-msg-content {
            background: rgba(99, 102, 241, 0.06);
            color: #1e293b;
            border: 1px solid rgba(99, 102, 241, 0.12);
            border-bottom-left-radius: 4px;
        }
        .ai-msg-bubble-ai .ai-msg-content strong {
            color: #6366f1;
        }
        .ai-list-num {
            color: #6366f1;
            font-weight: 700;
        }

        /* ===== LOADING DOTS ===== */
        .ai-loading-dots {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .ai-dot {
            width: 8px;
            height: 8px;
            background: #6366f1;
            border-radius: 50%;
            animation: dotBounce 1.4s ease-in-out infinite;
        }
        .ai-dot:nth-child(2) { animation-delay: 0.2s; }
        .ai-dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes dotBounce {
            0%, 80%, 100% { transform: scale(0.6); opacity: 0.3; }
            40% { transform: scale(1); opacity: 1; }
        }
        .ai-loading-text {
            font-size: 0.75rem;
            color: #64748b;
            font-style: italic;
            margin-left: 4px;
        }

        /* ===== SIDEBAR OVERRIDE (light theme) ===== */
        app-sidebar aside {
            background: #ffffff !important;
            border-color: rgba(99, 102, 241, 0.1) !important;
        }
        app-sidebar a {
            color: #64748b !important;
        }
        app-sidebar .text-blue-600 {
            color: #6366f1 !important;
        }
        app-sidebar .bg-blue-50 {
            background: rgba(99, 102, 241, 0.08) !important;
        }
        app-sidebar h2 {
            color: #1e293b !important;
        }
        app-sidebar p {
            color: #64748b !important;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 1024px) {
            #ai-charts-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <!-- Background Effect -->
    <div class="ai-bg-grid"></div>

    <!-- Sidebar -->
    <app-sidebar></app-sidebar>

    <!-- Main Content -->
    <main class="ai-main">
        <!-- Header -->
        <header class="ai-header">
            <div class="flex items-center justify-between flex-wrap gap-4">
                <div>
                    <h1 class="ai-header-title">🧠 AI Data Analyst</h1>
                    <p class="ai-header-sub">Generate charts & deep analysis dari DVD Rental database menggunakan AI.</p>
                </div>
                <div class="ai-header-badge">
                    <span class="pulse-dot"></span>
                    Groq LLM • PostgreSQL Live
                </div>
            </div>
        </header>

        <!-- Content -->
        <!-- Content -->
        <div class="ai-content" style="padding-bottom: 0;">
            <!-- Chat messages sekarang mengisi seluruh area konten -->
            <div id="ai-chat-messages" style="flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 1rem; padding-bottom: 2rem; scrollbar-width: thin;"></div>
        </div>

        <!-- Chat Panel (Sticky Bottom) -->
        <div class="ai-chat-panel">
            <!-- Suggestion Chips -->
            <div class="ai-suggestions">
                <!-- (Biarkan suggestion chips kamu di sini seperti sebelumnya) -->
                <button class="ai-suggestion-chip" data-prompt="Tampilkan top 10 film dengan revenue tertinggi dalam bentuk bar chart">📊 Top 10 Film Revenue</button>
                <button class="ai-suggestion-chip" data-prompt="Buat pie chart distribusi genre film">🥧 Genre Distribution</button>
                <!-- dst... -->
            </div>

            <!-- Input -->
            <div class="ai-input-row">
                <input type="text" id="ai-chat-input" placeholder="Tanya AI: 'Buat chart revenue per genre' atau 'Analisis tren penjualan'...">
                <button id="ai-send-btn">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/>
                    </svg>
                    Kirim
                </button>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer style="margin-left:16rem; text-align:center; padding:1rem; color:#64748b; font-size:0.75rem; border-top:1px solid rgba(99,102,241,0.1); background:rgba(255,255,255,0.6); transition: all 0.3s;">
        © 2026 Movie Rental System | Adrian Alrizqullah Mardiat - Information Systems
    </footer>
</body>
</html>
